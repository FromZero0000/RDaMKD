EXPERIMENT:
  PROJECT: "distill_cifar100"
  NAME: ""
  TAG: "manifoldalignkd_cka,res32x4_shuv2"

DATASET:
  TYPE: "cifar100"
  NUM_WORKERS: 4
  NUM_CLASSES: 100
  TEST:
    BATCH_SIZE: 512

DISTILLER:
  TYPE: "ManifoldAlignKD_CKA"
  TEACHER: "resnet32x4"
  STUDENT: "ShuffleV2"

SOLVER:
  TRAINER: "base"              # 或 "dot"
  TYPE: "SGD"
  BATCH_SIZE: 64
  EPOCHS: 240
  LR: 0.01
  LR_DECAY_STAGES: [150, 180, 210]
  LR_DECAY_RATE: 0.1
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0005
  ETA_MIN: 5e-5          # 最小学习率
  WARMUP_EPOCHS: 20     # 线性预热轮数（若不要预热，设 0）
  WARMUP_START_LR: 0.005 # 预热起始 LR
  LR_MODE: "step"

LOG:
  PREFIX: "./output"
  WANDB: false
  TENSORBOARD_FREQ: 200
  SAVE_CHECKPOINT_FREQ: 40


# ========== CKA 版流形蒸馏配置 ==========
ManifoldAlignKD_CKA:
  # 任务 & logits 蒸馏
  CE_WEIGHT: 1.0
  KD_WEIGHT: 1.0
  KD_T: 4.0
  BASE_TYPE: dkd          # 可选："none"、"kd"、"dkd"、"mlkd"
  WARMUP: 1

  # 多层蒸馏：取 feats 列表中的第 2、4、最后一层（负索引 -1）
  # 注意：LAYER_WEIGHTS 长度要和 LAYER_IDS 一致
  LAYER_IDS: [-1]
  LAYER_WEIGHTS: [1.0]

  # 子空间与核
  SUBSPACE_DIM: 32
  MMD:
    KERNEL: "linear"
    SIGMA: 1.0

  # 几何保持
  GEO_TOPK: 8
  LAMBDA_MMD: 1.0
  LAMBDA_GEO: 1.0

  # μ 自适应（CKA）
  MU:
    MODE: "cka"
    BASE: 0.5
    ALPHA: 3.0
    CENTER: 0.5
