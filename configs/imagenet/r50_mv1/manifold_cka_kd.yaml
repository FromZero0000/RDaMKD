EXPERIMENT:
  PROJECT: "distill_imagenet"
  NAME: ""
  TAG: "manifoldcka,r50_mnv1"

DATASET:
  TYPE: "imagenet"
  NUM_WORKERS: 32
  NUM_CLASSES: 1000
  INPUT_SIZE: 224
  TEST:
    BATCH_SIZE: 256

DISTILLER:
  TYPE: "ManifoldAlignKD_CKA"   # ★ 对应 manifold_CKA_kd.py 中注册名
  TEACHER: "ResNet50"
  STUDENT: "MobileNetV1"

SOLVER:
  TRAINER: "base"
  TYPE: "SGD"
  BATCH_SIZE: 512
  EPOCHS: 120
  LR: 0.2
  LR_DECAY_STAGES: [30, 60, 90]
  LR_DECAY_RATE: 0.1
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0001
  DOT:
    DELTA: 0.075

LOG:
  PREFIX: "./output_imagenet"
  WANDB: false
  TENSORBOARD_FREQ: 1000
  SAVE_CHECKPOINT_FREQ: 10

ManifoldAlignKD_CKA:
  CE_WEIGHT: 1.0
  KD_WEIGHT: 1.0        # logits KD 权重
  KD_T: 4.0             # KD 温度
  BASE_TYPE: dkd        # 可选："none"、"kd"、"dkd"、"mlkd"
  WARMUP: 1

  # 层选择，与原 MANIFOLD_KD 保持一致
  LAYER_IDS: [-1]
  LAYER_WEIGHTS: [1.0]

  # 子空间维度 & MMD 配置
  SUBSPACE_DIM: 32
  MMD:
    KERNEL: "linear"
    SIGMA: 2.0

  # 几何保持相关
  GEO_TOPK: 8
  LAMBDA_MMD: 1.0
  LAMBDA_GEO: 1.0

  # μ(CKA) 动态调度整体对齐强度
  MU:
    MODE: "cka"
    BASE: 0.5
    ALPHA: 3.0
    CENTER: 0.5

DKD:
  CE_WEIGHT: 1.0
  BETA: 2.0
  T: 1.0
  WARMUP: 1
